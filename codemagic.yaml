# ABIDE — Codemagic CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Two workflows run on every push to main:
#   android-deploy  →  Google Play Internal Testing  (Linux runner, faster/cheaper)
#   ios-deploy      →  TestFlight                    (Mac M2 runner, required for iOS)
#
# ── Environment variable groups to create in Codemagic UI ────────────────────
# Go to: Codemagic → Teams → Global variables and secrets
#
# Group: android_credentials
#   CM_KEYSTORE                    Base64-encoded abide-release.jks
#   CM_KEY_ALIAS                   abide
#   CM_KEY_PASSWORD                (your keystore key password)
#   CM_STORE_PASSWORD              (your keystore store password)
#   GOOGLE_PLAY_CREDENTIALS        Full JSON content of Google Cloud service account
#
# ── App Store Connect integration ─────────────────────────────────────────────
# Update the `app_store_connect:` value below with the name of your existing
# App Store Connect integration (the one you set up for ViBE).

workflows:

  # ── Android → Google Play Internal Testing ──────────────────────────────────
  android-deploy:
    name: Android — Internal Testing
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    environment:
      flutter: stable
      java: 17
      groups:
        - android_credentials
      vars:
        PACKAGE_NAME: com.abide.daily
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true

      - name: Configure Android signing
        script: |
          # Resolve keystore: CM_KEYSTORE is a file path when set as a
          # Codemagic file-type variable, or base64 content otherwise.
          if [ -f "$CM_KEYSTORE" ]; then
            KEYSTORE_PATH="$CM_KEYSTORE"
          else
            echo "$CM_KEYSTORE" | base64 --decode > /tmp/abide-release.jks
            KEYSTORE_PATH="/tmp/abide-release.jks"
          fi
          # Convert to JKS — Android Gradle's embedded BouncyCastle cannot
          # read AES-256 PKCS12 (causes "Tag number over 30" error); JDK 17
          # keytool CAN read it and export to the always-supported JKS format.
          keytool -importkeystore \
            -srckeystore "$KEYSTORE_PATH" \
            -srcstorepass "$CM_STORE_PASSWORD" \
            -srckeypass "$CM_KEY_PASSWORD" \
            -srcalias "$CM_KEY_ALIAS" \
            -destkeystore /tmp/abide-release-jks.jks \
            -deststoretype JKS \
            -deststorepass "$CM_STORE_PASSWORD" \
            -destkeypass "$CM_KEY_PASSWORD" \
            -destalias "$CM_KEY_ALIAS" \
            -noprompt 2>&1 | head -10
          if [ -f /tmp/abide-release-jks.jks ]; then
            KEYSTORE_PATH="/tmp/abide-release-jks.jks"
          fi
          cat > android/key.properties << KEYEOF
          storePassword=$CM_STORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          KEYEOF

      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.aab
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - jvargas22@duck.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GOOGLE_PLAY_CREDENTIALS
        track: internal
        submit_as_draft: false


  # ── iOS → TestFlight ─────────────────────────────────────────────────────────
  ios-deploy:
    name: iOS — TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    integrations:
      app_store_connect: ABIDE
    environment:
      flutter: 3.44.4
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.abide.daily
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jvargas22@duck.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
